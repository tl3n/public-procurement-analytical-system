services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PROZORRO_API_URL: ${PROZORRO_API_URL}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES}
      MAX_TENDERS: ${MAX_TENDERS}
      INITIAL_LOAD_START_TIMESTAMP: ${INITIAL_LOAD_START_TIMESTAMP}
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    build: ./backend
    # Apply schema migrations first, then start the periodic sync loop.
    command: sh -c "alembic upgrade head && python -m app.scheduler.main"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PROZORRO_API_URL: ${PROZORRO_API_URL}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES}
      MAX_TENDERS: ${MAX_TENDERS}
      INITIAL_LOAD_START_TIMESTAMP: ${INITIAL_LOAD_START_TIMESTAMP}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
